name: Android CI (Build Real APK)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ၁။ Repository ထဲက ကုဒ်တွေကို ဆွဲယူခြင်း
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ၂။ Java Environment (JDK 17) ပြင်ဆင်ခြင်း
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # ၃။ ပျောက်ဆုံးနေတဲ့ Gradle Wrapper JAR ဖိုင်ကို Download ဆွဲခြင်း
    - name: Download Gradle Wrapper JAR
      run: |
        mkdir -p gradle/wrapper
        curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar

    # ၄။ gradlew script ကို မောင်းနှင်ခွင့် (Permission) ပေးခြင်း
    - name: Grant Execute Permission for Gradle
      run: chmod +x gradlew

    # ၅။ Real APK ဖြစ်တဲ့ Debug APK ကို စတင် Build လုပ်ခြင်း
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # ၆။ ထွက်လာတဲ့ APK ဖိုင်ကို GitHub Actions စာမျက်နှာပေါ်မှာ ဒေါင်းလုဒ်ဆွဲနိုင်အောင် တင်ပေးခြင်း
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AiNextIde-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
